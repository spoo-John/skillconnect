<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    /* Page background */
    html {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    /* Glass container */
    .glass {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 40px 50px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.2);
      text-align: center;
      width: 360px;
      animation: fadeInUp 0.6s ease both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Heading */
    h1 {
      color: #ffffff;
      font-size: 46px;
      margin-bottom: 30px;
      margin-top: 0;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.25);
      letter-spacing: -1px;
    }

    /* Labels */
    label {
      color: #8ab4f8;
      font-size: 17px;
      font-weight: 600;
      display: block;
      margin: 15px 0 6px;
      text-align: left;
    }

    /* Inputs */
    input {
      width: 280px;
      padding: 12px;
      font-size: 16px;
      color: #ffffff;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 10px;
      outline: none;
      transition: 0.3s ease;
      box-sizing: border-box;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    /* Input focus */
    input:focus {
      border-color: #8ab4f8;
      box-shadow: 0 0 10px rgba(138, 180, 248, 0.6);
    }

    /* Button */
    button {
      margin-top: 25px;
      padding: 14px 32px;
      font-size: 18px;
      color: #ffffff;
      background: linear-gradient(135deg, #1f1f1f, #3a3a3a);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
      transition: all 0.3s ease;
      width: 100%;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* Button hover */
    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }

    /* Button click */
    button:active {
      transform: scale(0.96);
    }

    .divider {
      margin: 20px 0 0;
      color: rgba(255, 255, 255, 0.35);
      font-size: 13px;
    }

    .divider a {
      color: #8ab4f8;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .divider a:hover {
      opacity: 0.75;
    }

    .field-wrap {
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="glass">
    <h1>Sign In</h1>
    <form action="#" method="POST" novalidate>

      <div class="field-wrap">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="field-wrap">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit">Login</button>
    </form>

    <p class="divider">Don't have an account? <a href="#">Register</a></p>
  </div>
</body>
</html>
